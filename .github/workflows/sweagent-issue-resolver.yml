name: SWE-agent on Issue Comment (disabled)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: Disabled in public fork
    runs-on: ubuntu-22.04
    steps:
      - name: Explain disabled resolver
        run: |
          echo "SWE-agent issue-comment automation is disabled in this public fork."
          echo "Do not run autonomous resolver agents from public issue text on persistent runners."
          echo "Use a private fork or an explicitly reviewed workflow for trusted resolver runs."
